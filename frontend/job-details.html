<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Job Details</title><link rel="stylesheet" href="styles.css"></head><body><div class="container"><div class="card"><h2 id="title">Job</h2><p id="desc"></p><button id="apply">Apply</button><button id="startTest" class="secondary">Start Test</button><p id="msg" class="small"></p></div></div><script src="app.js"></script><script>const id=new URLSearchParams(location.search).get('id');(async()=>{try{const j=await request(`/api/jobs/${id}`);title.textContent=j.title;desc.textContent=j.description;}catch(e){show('msg',e.message,true);}})();apply.onclick=async()=>{try{await request(`/api/jobs/${id}/apply`,{method:'POST'});show('msg','Applied');}catch(e){show('msg',e.message,true);}};startTest.onclick=()=>location.href=`test.html?job=${id}`;</script></body></html>
