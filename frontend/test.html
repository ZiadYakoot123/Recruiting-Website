<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Test</title><link rel="stylesheet" href="styles.css"></head><body><div class="container"><div class="card"><h2>Candidate Test</h2><p>Time left: <span id="timer">--</span></p><form id="form"></form><button id="submit">Submit</button><p id="msg" class="small"></p></div></div><script src="app.js"></script><script>const job=new URLSearchParams(location.search).get('job');let seconds=0;let questions=[];function tick(){timer.textContent=`${Math.floor(seconds/60)}:${String(seconds%60).padStart(2,'0')}`;if(seconds<=0){submit.click();return;}seconds--;setTimeout(tick,1000)};(async()=>{try{const t=await request(`/api/tests/job/${job}`);seconds=t.time_limit_seconds;questions=t.questions;form.innerHTML=questions.map((q,i)=>`<div class='card'><p><b>Q${i+1}</b> ${q.text}</p>${(q.options||[]).map(o=>`<label><input type='radio' name='q_${q.id}' value='${o}'> ${o}</label><br>`).join('')}</div>`).join('');tick()}catch(e){show('msg',e.message,true)}})();submit.onclick=async(e)=>{e.preventDefault();try{const answers=questions.map(q=>({question_id:q.id,selected_answer:(document.querySelector(`input[name=q_${q.id}]:checked`)||{}).value||''}));const r=await request(`/api/tests/job/${job}/submit`,{method:'POST',body:JSON.stringify({answers})});localStorage.setItem('lastResult',JSON.stringify(r));location.href='results.html';}catch(err){show('msg',err.message,true)}};</script></body></html>
