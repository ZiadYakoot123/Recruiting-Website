<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login</title><link rel="stylesheet" href="styles.css"></head><body><div class="container"><div class="card"><h2>Login</h2><input id="email" placeholder="Email"><input id="password" type="password" placeholder="Password"><button id="login">Login</button><p id="msg" class="small"></p><a href="register.html">Create account</a></div></div><script src="app.js"></script><script>login.onclick=async()=>{try{const r=await request('/api/auth/login',{method:'POST',body:JSON.stringify({email:email.value,password:password.value})});localStorage.setItem('token',r.access_token);show('msg','Logged in');location.href='dashboard.html';}catch(e){show('msg',e.message,true);}}</script></body></html>
