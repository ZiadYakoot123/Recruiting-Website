<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Employee Profile</title><link rel="stylesheet" href="styles.css"></head><body><div class="container"><div class="card"><h2>Employee Profile</h2><input id="skills" placeholder="Skills comma-separated"><textarea id="experience" placeholder="Experience"></textarea><textarea id="education" placeholder="Education"></textarea><input id="links" placeholder="Portfolio links comma-separated"><button id="save">Save</button><input id="cv" type="file" accept="application/pdf"><button id="upload" class="secondary">Upload CV (PDF)</button><p id="msg" class="small"></p></div></div><script src="app.js"></script><script>save.onclick=async()=>{try{await request('/api/profiles/employee',{method:'PUT',body:JSON.stringify({skills:skills.value.split(',').map(s=>s.trim()).filter(Boolean),experience:experience.value,education:education.value,portfolio_links:links.value.split(',').map(s=>s.trim()).filter(Boolean)})});show('msg','Saved');}catch(e){show('msg',e.message,true)}};upload.onclick=async()=>{try{const f=cv.files[0];const fd=new FormData();fd.append('file',f);const res=await fetch(`${API}/api/profiles/employee/cv`,{method:'POST',headers:{...authHeaders()},body:fd});const data=await res.json();if(!res.ok)throw new Error(data.detail||'Upload failed');show('msg','CV uploaded and parsed');}catch(e){show('msg',e.message,true)}};</script></body></html>
