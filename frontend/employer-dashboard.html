<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Employer Dashboard</title><link rel="stylesheet" href="styles.css"></head><body><div class="container"><div class="card"><h2>Create Job</h2><input id="title" placeholder="Title"><textarea id="description" placeholder="Description"></textarea><input id="skills" placeholder="Required skills comma-separated"><input id="experience" placeholder="Experience level"><select id="difficulty"><option>easy</option><option selected>medium</option><option>hard</option></select><input id="time" type="number" value="1800" min="300" max="7200"><button id="create">Create with AI test</button><p id="msg" class="small"></p></div></div><script src="app.js"></script><script>create.onclick=async()=>{try{const r=await request('/api/jobs',{method:'POST',body:JSON.stringify({title:title.value,description:description.value,required_skills:skills.value.split(',').map(s=>s.trim()).filter(Boolean),experience_level:experience.value||'mid',difficulty_level:difficulty.value,test_time_limit_seconds:Number(time.value)})});show('msg',`Job created #${r.job_id}`);}catch(e){show('msg',e.message,true);}};</script></body></html>
