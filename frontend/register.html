<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Register</title><link rel="stylesheet" href="styles.css"></head><body><div class="container"><div class="card"><h2>Register</h2><input id="name" placeholder="Full Name"><input id="email" placeholder="Email"><input id="password" type="password" placeholder="Password"><select id="role"><option value="employee">Employee</option><option value="employer">Employer</option></select><button id="register">Register</button><p id="msg" class="small"></p></div></div><script src="app.js"></script><script>register.onclick=async()=>{try{const r=await request('/api/auth/register',{method:'POST',body:JSON.stringify({name:name.value,email:email.value,password:password.value,role:role.value})});localStorage.setItem('token',r.access_token);show('msg','Registered');location.href='dashboard.html';}catch(e){show('msg',e.message,true);}}</script></body></html>
