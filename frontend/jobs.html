<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Jobs</title><link rel="stylesheet" href="styles.css"></head><body><div class="container"><div class="card"><h2>Jobs</h2><div id="jobs" class="grid"></div></div></div><script src="app.js"></script><script>(async()=>{try{const list=await request('/api/jobs');jobs.innerHTML=list.map(j=>`<div class='card'><h3>${j.title}</h3><p>${j.description}</p><p>${j.required_skills.map(s=>`<span class='badge'>${s}</span>`).join('')}</p><a href='job-details.html?id=${j.id}'>Details</a></div>`).join('')}catch(e){jobs.innerHTML=e.message}})();</script></body></html>
